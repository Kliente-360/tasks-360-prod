name: CI

# Roda em todo PR contra main + em commits diretos na main. Garante que
# nada quebrado vai pro Vercel preview.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela CI antigo no mesmo branch quando push novo entra (PRs ativos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint · Typecheck · Vitest · Build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      # Placeholders pra Supabase JS bootar no build. Não fazem requisição
      # real — só precisam existir.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
