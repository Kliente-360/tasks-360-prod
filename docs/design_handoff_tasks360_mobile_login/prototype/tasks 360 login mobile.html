<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tasks 360 — Entrar (mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hifi/app.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #ECEBE5 0%, transparent 60%), #E4E3DC;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
  }
  .scaleWrap { transform-origin: center center; }

  .ml { height: 100%; display: flex; flex-direction: column; background: var(--bg); padding: 0 26px; }
  .ml-top { flex: none; padding-top: 92px; display: flex; align-items: center; gap: 12px; }
  .ml-top b { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
  .ml-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-bottom: 40px; }
  .ml-title { font-size: 30px; font-weight: 700; letter-spacing: -0.03em; }
  .ml-title em { font-style: normal; color: var(--green); }
  .ml-tag { color: var(--fg-muted); font-size: 14px; margin-top: 8px; line-height: 1.5; }

  .ml-section { margin-top: 26px; }
  .ml-eyebrow { font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 11px; }

  .ml-auth {
    width: 100%; height: 52px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; justify-content: center; gap: 11px;
    font-size: 15px; font-weight: 500; font-family: var(--sans);
    border: 1px solid var(--line-strong); background: var(--bg); color: var(--fg);
    transition: all var(--dur) var(--ease);
  }
  .ml-auth:active { background: var(--bg-alt); }
  .ml-auth svg { width: 19px; height: 19px; }

  .ml-divider { display: flex; align-items: center; gap: 14px; margin: 22px 0; }
  .ml-divider .ln { flex: 1; height: 1px; background: var(--line); }
  .ml-divider span { font-family: var(--mono); font-size: 11px; color: var(--fg-muted); }

  .ml-input {
    width: 100%; height: 52px; padding: 0 16px; border-radius: var(--r-md);
    border: 1px solid var(--line-strong); background: var(--bg);
    font: inherit; font-size: 16px; color: var(--fg); transition: all var(--dur) var(--ease);
  }
  .ml-input::placeholder { color: var(--fg-muted); }
  .ml-input:focus { outline: 0; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }

  .ml-cta {
    width: 100%; height: 52px; margin-top: 12px; border-radius: var(--r-pill);
    border: 0; background: var(--green); color: #fff;
    font-size: 15px; font-weight: 500; font-family: var(--sans);
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: all var(--dur) var(--ease);
  }
  .ml-cta:disabled { background: var(--green-soft); color: var(--green); }

  .ml-foot { flex: none; padding: 20px 0 calc(34px + 16px); font-size: 13px; color: var(--fg-muted); line-height: 1.5; text-align: center; }
  .ml-foot a { color: var(--green); text-decoration: none; font-weight: 500; }

  .mk { position: relative; width: 30px; height: 30px; flex: none; }
  .mk span { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--logo-green); }
  .mk span:nth-child(1){ top:0; left:50%; transform:translateX(-50%); opacity:.45; }
  .mk span:nth-child(2){ top:50%; left:0; transform:translateY(-50%); opacity:.65; }
  .mk span:nth-child(3){ top:50%; right:0; transform:translateY(-50%); opacity:.85; }
  .mk span:nth-child(4){ bottom:0; left:50%; transform:translateX(-50%); opacity:1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="hifi/ios-frame.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function MobileLogin() {
    const [email, setEmail] = useState('');
    const [sent, setSent] = useState(false);
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
    return (
      <div className="ml">
        <div className="ml-top">
          <span className="mk"><span></span><span></span><span></span><span></span></span>
          <b>tasks 360</b>
        </div>
        <div className="ml-body">
          <h1 className="ml-title">Entrar</h1>
          <p className="ml-tag">Gestão do time, dos prazos e dos clientes em um só lugar.</p>

          <div className="ml-section">
            <div className="ml-eyebrow">Time interno</div>
            <button className="ml-auth" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
              </svg>
              Acesso Time Interno
            </button>
          </div>

          <div className="ml-divider"><span className="ln"></span><span>ou</span><span className="ln"></span></div>

          <div className="ml-section" style={{ marginTop: 0 }}>
            <div className="ml-eyebrow">Acessar como cliente externo</div>
            <input className="ml-input" type="email" inputMode="email" placeholder="voce@empresa.com"
              value={email} onChange={(e) => { setEmail(e.target.value); setSent(false); }} />
            <button className="ml-cta" type="button" disabled={!ok} onClick={() => setSent(true)}>
              {sent ? 'Código enviado →' : 'Receber código por email'}
            </button>
          </div>
        </div>
        <div className="ml-foot">
          Não está cadastrado? <a href="#">Peça acesso ao admin do espaço.</a>
        </div>
      </div>
    );
  }

  function Proto() {
    return (
      <div className="scaleWrap">
        <IOSDevice><MobileLogin /></IOSDevice>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Proto />);

  function fit() {
    const wrap = document.querySelector('.scaleWrap');
    if (!wrap) return;
    const m = 48;
    const s = Math.min(1, (window.innerWidth - m) / 402, (window.innerHeight - m) / 874);
    wrap.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  const obs = new MutationObserver(() => { if (document.querySelector('.scaleWrap')) fit(); });
  obs.observe(document.getElementById('root'), { childList: true, subtree: true });
  setTimeout(fit, 100); setTimeout(fit, 600);
</script>
</body>
</html>
