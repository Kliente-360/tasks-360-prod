<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tasks 360 — Hi-fi Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hifi/app.css" />
<link rel="stylesheet" href="hifi/mobile.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #ECEBE5 0%, transparent 60%),
      #E4E3DC;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #stage { position: relative; }
  #stage .scaleWrap { transform-origin: center center; }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hifi/icons.jsx"></script>
<script type="text/babel" src="hifi/ui.jsx"></script>
<script type="text/babel" src="hifi/data.jsx"></script>
<script type="text/babel" src="hifi/ios-frame.jsx"></script>
<script type="text/babel" src="hifi/mobile.jsx"></script>
<script type="text/babel">
  function MobilePrototype() {
    return (
      <div className="scaleWrap">
        <IOSDevice>
          <MobileApp />
        </IOSDevice>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<MobilePrototype />);

  // scale device to fit viewport
  function fit() {
    const wrap = document.querySelector('.scaleWrap');
    if (!wrap) return;
    const margin = 48;
    const s = Math.min(1, (window.innerWidth - margin) / 402, (window.innerHeight - margin) / 874);
    wrap.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  const obs = new MutationObserver(() => { if (document.querySelector('.scaleWrap')) { fit(); } });
  obs.observe(document.getElementById('root'), { childList: true, subtree: true });
  setTimeout(fit, 100);
  setTimeout(fit, 600);
</script>
</body>
</html>
