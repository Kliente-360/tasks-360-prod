<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tasks 360 — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hifi/app.css" />
<style>
  html, body { height: 100%; }
  body { background: var(--bg); overflow-x: hidden; }
  .login { display: flex; min-height: 100vh; }

  /* ---------- BRAND PANEL ---------- */
  .brand-panel {
    flex: 1.05; background: var(--bg-dark); color: #fff;
    position: relative; overflow: hidden;
    padding: 48px 56px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .bp-top { display: flex; align-items: center; gap: 12px; position: relative; z-index: 2; }
  .bp-top b { font-size: 17px; font-weight: 600; letter-spacing: -0.015em; }
  .bp-mid { position: relative; z-index: 2; max-width: 480px; }
  .bp-eyebrow { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,.5); }
  .bp-mid h1 { font-size: clamp(30px, 3.4vw, 46px); font-weight: 700; letter-spacing: -0.035em; line-height: 1.04; margin-top: 18px; }
  .bp-mid h1 em { font-style: normal; color: #34C77B; }
  .bp-mid .lead { font-size: 16px; line-height: 1.6; color: rgba(255,255,255,.66); margin-top: 18px; max-width: 380px; }
  .bp-foot { position: relative; z-index: 2; display: flex; align-items: center; gap: 16px; font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: .04em; }
  .bp-foot .d { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.3); }
  /* aperture watermark */
  .bp-mark { position: absolute; right: -160px; top: 50%; transform: translateY(-50%); width: 620px; height: 620px; z-index: 1; opacity: .9; }
  .bp-mark circle { fill: #009900; }

  /* ---------- FORM PANEL ---------- */
  .form-panel { flex: .95; display: flex; align-items: center; justify-content: center; padding: 40px 32px; }
  .form-wrap { width: 100%; max-width: 372px; }
  .fw-brand { display: none; align-items: center; gap: 13px; margin-bottom: 28px; }
  .fw-brand b { font-size: 19px; font-weight: 600; letter-spacing: -0.015em; }
  .fw-brand .by { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-muted); margin-top: 3px; }

  .fw-title { font-size: 27px; font-weight: 700; letter-spacing: -0.03em; }
  .fw-sub { color: var(--fg-muted); font-size: 14px; margin-top: 7px; }

  .fw-section { margin-top: 26px; }
  .fw-eyebrow { font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 11px; }

  .btn-auth {
    width: 100%; height: 48px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; justify-content: center; gap: 11px;
    font-size: 14.5px; font-weight: 500; font-family: var(--sans);
    border: 1px solid var(--line-strong); background: var(--bg); color: var(--fg);
    transition: all var(--dur) var(--ease); cursor: pointer;
  }
  .btn-auth:hover { border-color: var(--fg); }
  .btn-auth:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
  .btn-auth svg { width: 18px; height: 18px; }

  .fw-divider { display: flex; align-items: center; gap: 14px; margin: 24px 0; }
  .fw-divider .ln { flex: 1; height: 1px; background: var(--line); }
  .fw-divider span { font-family: var(--mono); font-size: 11px; color: var(--fg-muted); }

  .fw-input {
    width: 100%; height: 48px; padding: 0 15px; border-radius: var(--r-md);
    border: 1px solid var(--line-strong); background: var(--bg);
    font: inherit; font-size: 15px; color: var(--fg); transition: all var(--dur) var(--ease);
  }
  .fw-input::placeholder { color: var(--fg-muted); }
  .fw-input:focus { outline: 0; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }

  .btn-cta {
    width: 100%; height: 48px; margin-top: 11px; border-radius: var(--r-pill);
    border: 0; background: var(--green); color: #fff;
    font-size: 14.5px; font-weight: 500; font-family: var(--sans);
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: all var(--dur) var(--ease); cursor: pointer;
  }
  .btn-cta:hover { background: var(--green-hover); transform: translateY(-1px); }
  .btn-cta:disabled { background: var(--green-soft); color: var(--green); cursor: not-allowed; transform: none; }
  .btn-cta svg { width: 16px; height: 16px; }

  .fw-foot { margin-top: 32px; padding-top: 22px; border-top: 1px solid var(--line); font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
  .fw-foot a { color: var(--green); text-decoration: none; font-weight: 500; }
  .fw-foot a:hover { text-decoration: underline; }

  /* aperture mark (form, light) */
  .mark-lg { position: relative; width: 30px; height: 30px; flex: none; }
  .mark-lg span { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--logo-green); }
  .mark-lg span:nth-child(1){ top:0; left:50%; transform:translateX(-50%); opacity:.45; }
  .mark-lg span:nth-child(2){ top:50%; left:0; transform:translateY(-50%); opacity:.65; }
  .mark-lg span:nth-child(3){ top:50%; right:0; transform:translateY(-50%); opacity:.85; }
  .mark-lg span:nth-child(4){ bottom:0; left:50%; transform:translateX(-50%); opacity:1; }
  .mark-w span { background: #fff; }

  @media (max-width: 900px) {
    .brand-panel { display: none; }
    .form-panel { flex: 1; padding: 40px 24px 56px; }
    .fw-brand { display: flex; }
  }
</style>
</head>
<body>
<div class="login">

  <!-- BRAND -->
  <section class="brand-panel">
    <svg class="bp-mark" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="14" r="13" opacity="0.10"/>
      <circle cx="14" cy="50" r="13" opacity="0.14"/>
      <circle cx="86" cy="50" r="13" opacity="0.18"/>
      <circle cx="50" cy="86" r="13" opacity="0.22"/>
    </svg>
    <div class="bp-top">
      <span class="mark-lg mark-w"><span></span><span></span><span></span><span></span></span>
      <b>tasks 360</b>
    </div>
    <div class="bp-mid">
      <div class="bp-eyebrow">Acesso · time &amp; clientes</div>
      <h1>Conhecimento aplicado, <em>como serviço</em>.</h1>
      <p class="lead">Gestão do time, dos prazos e dos clientes em um só lugar.</p>
    </div>
    <div class="bp-foot">
      <span>KLIENTE 360</span><span class="d"></span><span>ACESSO SEGURO</span><span class="d"></span><span>v1.02</span>
    </div>
  </section>

  <!-- FORM -->
  <section class="form-panel">
    <div class="form-wrap">
      <div class="fw-brand">
        <span class="mark-lg"><span></span><span></span><span></span><span></span></span>
        <div>
          <b>tasks 360</b>
        </div>
      </div>

      <h2 class="fw-title">Entrar</h2>

      <div class="fw-section">
        <button class="btn-auth" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
          </svg>
          Acesso Time Interno
        </button>
      </div>

      <div class="fw-divider"><span class="ln"></span><span>ou</span><span class="ln"></span></div>

      <div class="fw-section" style="margin-top:0">
        <div class="fw-eyebrow">Acessar como cliente externo</div>
        <input class="fw-input" id="email" type="email" placeholder="voce@empresa.com" autocomplete="email" />
        <button class="btn-cta" id="cta" type="button" disabled>Receber código por email</button>
      </div>

      <div class="fw-foot">
        Não está cadastrado? <a href="#">Peça acesso ao admin do espaço.</a>
      </div>
    </div>
  </section>

</div>

<script>
  const email = document.getElementById('email');
  const cta = document.getElementById('cta');
  const ok = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
  email.addEventListener('input', () => { cta.disabled = !ok(email.value); });
  cta.addEventListener('click', () => { if (ok(email.value)) cta.textContent = 'Código enviado →'; });
  email.addEventListener('keydown', (e) => { if (e.key === 'Enter' && ok(email.value)) cta.click(); });
</script>
</body>
</html>
